*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}



body{
    *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}


    font-family:Arial, Helvetica, sans-serif;
    background:#eef3f8;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}



.login-container{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}



.login-box{

    width:420px;

    background:#ffffff;

    padding:35px;

    border-radius:8px;

    border:1px solid #d7dde5;

    box-shadow:0 4px 10px rgba(0,0,0,.08);
}


.login-box h1{

    text-align:center;

    color:#1e4f7a;

    font-size:28px;

    margin-bottom:8px;
}

.subtitle{

    text-align:center;

    color:#666;

    margin-bottom:30px;

    font-size:15px;
}



.input-group{

    margin-bottom:20px;
}

.input-group label{

    display:block;

    margin-bottom:8px;

    color:#333;

    font-weight:bold;
}

.input-group input{

    width:100%;

    padding:12px;

    border:1px solid #c7ced6;

    border-radius:5px;

    font-size:15px;

    outline:none;
}

.input-group input:focus{

    border-color:#2e27e4;
}



.login-options{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:25px;
}

.remember{

    display:flex;

    align-items:center;

    gap:6px;

    font-size:14px;

    color:#555;
}

.login-options a{

    text-decoration:none;

    color:#1e88e5;

    font-size:14px;
}

.login-options a:hover{

    text-decoration:underline;
}
 nav{
        justify-content:center;
        flex-wrap:wrap;
        padding:20px;
    }
.login-btn{

    width:100%;

    padding:12px;

    background:#1830b9;

    color:white;

    border:none;

    border-radius:5px;

    font-size:16px;

    cursor:pointer;
}

.login-btn:hover{

    background:#276d49;
}



.signup-link{

    text-align:center;

    margin-top:25px;

    font-size:14px;

    color:#555;
}

.signup-link a{

    text-decoration:none;

    color:#1e88e5;

    font-weight:bold;
}

.signup-link a:hover{

    text-decoration:underline;
}
</style>
</head>
<body>
     <nav class="navbar">

         <nav class="navbar">

        <div class="logo">
            Pharmalivery
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">Explore</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

    </nav>
    <div class="login-container">

        <div class="login-box">

            <!-- Your login form -->

        </div>

    </div>


</nav>

<div class="login-container">

    <div class="login-box">

        <h1>Create Account</h1>

        <p class="subtitle">
            Create your pharmacy account
        </p>

        <form id="signupForm">

            <div class="input-group">

                <label for="fullname">Full Name</label>

                <input
                    type="text"
                    id="fullname"
                    placeholder="Enter your full name"
                    required>

            </div>

            <div class="input-group">

                <label for="email">Email Address</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required>

            </div>

            <div class="input-group">

                <label for="phone">Contact Number</label>

                <input
                    type="tel"
                    id="phone"
                    placeholder="98XXXXXXXX"
                    required>

            </div>

            <div class="input-group">

                <label for="username">Username</label>

                <input
                    type="text"
                    id="username"
                    placeholder="Choose a username"
                    required>

            </div>
            
            <div class="input-group">

                <label for="password">Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Create a password"
                    required>

            </div>

            <div class="input-group">

                <label for="confirmPassword">Confirm Password</label>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Re-enter your password"
                    required>

            </div>

            <!-- Error Message -->

            <p id="message" class="message"></p>

            <button type="submit" class="login-btn">
                Create Account
            </button>

        </form>

        <div class="signup-link">

            Already have an account?

            <a href="login.html">Login</a>

        </div>

    </div>

</div>

<script src="signup.js"></script>

</body>

</html>
