<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicine Search</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#eaf6ff,#d8f3ff,#ffffff);
    min-height:100vh;
}

/* Navigation */

nav{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:20px;
    padding:20px 50px;
    background:linear-gradient(90deg,#1E3A8A,#2563EB);
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
    position:sticky;
    top:0;
    z-index:100;
}

nav a{
    color:white;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
    padding:10px 18px;
    border-radius:30px;
    transition:.3s;
}

nav a:hover{
    background:white;
    color:#2563EB;
    transform:translateY(-3px);
}

/* Heading */

h1{
    text-align:center;
    font-size:55px;
    margin-top:60px;
    color:#1E3A8A;
    letter-spacing:1px;
}

h1 span{
    color:#0EA5E9;
}

/* Search Area */

.search{
    display:flex;
    justify-content:center;
    margin:40px 0;
}

#input{
    width:700px;
    height:65px;
    padding:0 25px;
    font-size:20px;
    border:none;
    outline:none;
    border-radius:40px;
    background:white;box-shadow:0 10px 30px rgba(0,0,0,.15); 
    transition:.3s;
}

#input:focus{
    transform:scale(1.02);
    box-shadow:0 10px 35px rgba(37,99,235,.35);
}

/* Search Suggestions */

#result{
    width:700px;
    margin:auto;
    border-radius:15px;
    overflow:hidden;
}

.item{
    padding:18px;
    background:white;
    border-bottom:1px solid #ddd;
    cursor:pointer;
    transition:.3s;
    font-size:18px;
}

.item:hover{
    background:#DBEAFE;
    padding-left:30px;
}

/* Details Card */

#details{
    width:750px;
    margin:40px auto;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.95);
    box-shadow:0 15px 35px rgba(0,0,0,.15);
    display:none;
    animation:fade .4s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

#details h2{
    color:#1E3A8A;
    margin-bottom:20px;
    text-align:center;
}

#details p{
    font-size:18px;
    line-height:1.8;
    color:#444;
    margin-bottom:12px;
}

/* Medicine Image */

.medi-img{
    width:350px;
    height:220px;
    object-fit:cover;
    display:block;
    margin:0 auto 25px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
    transition:.4s;
}

.medi-img:hover{
    transform:scale(1.05);
}

/* Scrollbar */

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-thumb{
    background:#2563EB;
    border-radius:20px;
}

::-webkit-scrollbar-track{
    background:#eee;
}

/* Responsive */

@media(max-width:768px){

    nav{
        justify-content:center;
        flex-wrap:wrap;
        padding:20px;
    }

    h1{
        font-size:38px;
        padding:0 15px;
    }

    #input,
    #result,
    #details{
        width:90%;
    }

    .medi-img{
        width:100%;
        height:200px;
    }
}
#btn{
    display:block;
    margin:25px auto 0;
    padding:12px 35px;
    background:#2563EB;
    color:white;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

#btn:hover{
    background:#1E3A8A;
    transform:scale(1.05);
}
</style>

</head>

<body>

<nav>
    <a href="home.html">Home</a>
    <a href="search.html">Explore</a>
    <a href="login.html">Login</a>
    <a href="contact.html">Contact us</a>
</nav>
<h1>Search Here</h1>

<div class="search">
    <input type="text" id="input" placeholder="Medicine name..." onkeyup="medsearch()">
</div>

<div id="result"></div>

<div id="details">
   <button  id="btn" onclick="goToPage()">Order</button>
</div>

<script>
    function goToPage(){
        window.location.href="login.html";
    }

const medicines = [

{
    name:"Paracetamol",
    description: "Paracetamol is an analgestic agent used to treat fever and mild to moderate pain. It reduce pain and fever. It doesn't treat the cause of your pain, it just eases the feeling of pain.",
    image:"paracetamol.png",
    price:"Rs.25",
    expiry:"12/2027",
    manufacturer:"ABC Pharma",
    dosage:"500 mg",
    stock:"Available",
    uses:"Used for fever and pain relief.",
    sideEffect:"Nausea, dizziness",
},

{
    name:"Ibuprofen",
    description:"Ibuprofen is a nosteroidal anti-inflammatory drug that is used to relieve pain, fever and inflammation. THis includes painful menstrual periods, migraines and rheumatoid arthritis.",
    image:"iburo.png",
    price:"Rs.40",
    expiry:"10/2028",
    manufacturer:"XYZ Pharma",
    dosage:"400 mg",
    stock:"Not available",
    uses:"Used to reduce pain and inflammation.",
    sideEffects:"Stomach upset"
},

{
    name:"Amoxicillin",
    description: "Amoxicillin is used to treat bacterial infections such as middle ear infection, strep throat, pneumonia , skin infections, odontogenic infections and urninary tract infections. It is taken orally or less commonly.",
    image:"amo.png",
    price:"Rs.60",
    expiry:"08/2028",
    manufacturer:"ABC Pharma",
    dosage:"250 mg",
    stock:"Available",
    uses:"Treats bacterial infections.",
    sideEffects:"Diarrhea, nausea"
},

{
    name:"Cetirizine",
    description: "Cetirizine is a second generation antihistamine used to treat allerfic rhinitis , dermatitis , urticaria and runny nose. It include effects like sleepiness , dry mouth , headache and abdominal pain. ",
    image:"ctz.png",
    price:"Rs.35",
    expiry:"03/2028",
    manufacturer:"Cipla",
    dosage:"10 mg",
    stock:"Not available",
    uses:"Relieves allergy symptoms.",
    sideEffects:"Sleepiness"
},

{
    name:"Aspirin",
    description:"Aspirin is a nonsteroidal anti-inflammatory drug used to reduce pain, fever and inflammation. It is used to treat inflammatory conditions including Kawasaki disease, pericarditis and rheumatic fever. ",
    image:"asp.png",
    price:"Rs.30",
    expiry:"11/2027",
    manufacturer:"Bayer",
    dosage:"75 mg",
    stock:"Available",
    uses:"Pain relief and blood thinner.",
    sideEffects:"Stomach irritation"
},

{
    name:"Omeprazole",
    description:"Omeprazole is a medicine that reduces the amount of acid in your stomach. It is used to treat conditions such as heartbun. It treat symptoms like stmach ulcerus, gastro-oesophageal reflux disease, discomfort from severe reflux in children.",
    image:"ome.png",
    price:"Rs.90",
    expiry:"05/2029",
    manufacturer:"Sun Pharma",
    dosage:"20 mg",
    stock:"Not available",
    uses:"Treats acidity and ulcers.",
    sideEffects:"Headache"
},

{
    name:"Metformin",
    description:"Metformin is used to treat high blood sugar levels that are caused by a type of diabetes mellitus or sugar diabetes called type 2 diabetes. It will help to lower blood sugar when it is too high and help restore the way you use food to make energy. ",
    image:"met.png",
    price:"Rs.80",
    expiry:"02/2029",
    manufacturer:"Novartis",
    dosage:"500 mg",
    stock:"Available",
    uses:"Controls diabetes.",
    sideEffects:"Nausea"
}

];

function medsearch(){

    let input=document.getElementById("input").value.toLowerCase();

    let result=document.getElementById("result");

    if(input==""){
        result.innerHTML="";
       let details = document.getElementById("details");
          details.innerHTML="";
         details.style.display="none";
         return ;
    }

    let output="";

    medicines.forEach(function(medicine){

        if(medicine.name.toLowerCase().includes(input)){

            output+=`
            <div class="item" onclick="selectMedicine('${medicine.name}')">
                ${medicine.name}
            </div>
            `;
        }

    });

    result.innerHTML=output;

}
function selectMedicine(name){

    let medicine = medicines.find(function(item){
        return item.name === name;
    });

    document.getElementById("input").value = medicine.name;

    document.getElementById("result").innerHTML = "";

    let details = document.getElementById("details");

    details.style.display = "block";

    details.innerHTML = `
        <h2>${ medicine.name}</h2>

        <p> ${medicine.description}</p>

        <img src="${medicine.image}" class="medi-img">

        <p><b>Price:</b> ${ medicine.price}</p>

        <p><b>Expiry Date:</b> ${ medicine.expiry}</p>

        <p><b>Manufacturer:</b> ${ medicine.manufacturer}</p>

        <p><b> Stock:</b> ${medicine.stock}</p>

        <p><b>Dosage:</b> ${ medicine.dosage}</p>

        <p><b>Uses:</b> ${ medicine.uses}</p>

        <p><b>Side Effects:</b> ${ medicine.sideEffects}</p>

        <button id="btn" onclick="goToPage()">Order Now</button>
    `;
}

</script>

</body>
</html>
