<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Log in </title>
</head>
<style>
    
</style>
<body>
    
    <div class="container">
        <div class="login-box">
            <h2> PHARMACY WEB SYSTEM</h2>
            <p> Please sign in to continue</p>
        </div>
        <form>
            <label for="Username">Username

            <input type="text" id="Username" placeholder="Enter your username" required="Username">
               </label>
                  <br>
            <label for="password">Password
            <input type="password" id="password" placeholder="Enter your password" required="password">
               </label>

            <div class="remember">
               

                <input type="checkbox" id="remember">

                <label for="remember"> Remember Me</label>
            </div>
            <button type="submit">Login</button>
            <p><a href="#">Forgot Password?</a></p>
        </form>
    </div>
</body>
</html>
