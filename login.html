<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Management System - Login</title>

    <link rel="stylesheet" href="style.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#eaf6ff,#d8f3ff,#ffffff);
            min-height:100vh;
        }
        
        nav{
            display:flex;
            justify-content:flex-end;
            align-items:center;
            gap:20px;
            padding:20px 50px;
             background:linear-gradient(90deg,#1E3A8A,#2563EB);
            box-shadow:0 5px 15px rgba(0,0,0,0.15);
     position:sticky;
    top:0;
    z-index:100;
    }

    nav a{
    color:white;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
    padding:10px 18px;
    border-radius:30px;
    transition:.3s;
}

nav a:hover{
    background:white;
    color:#2563EB;
    transform:translateY(-3px);
}

        /* Navigation CSS will be added by you */

        .login-container{
            min-height:calc(100vh - 80px);
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px 20px;
        }

        .login-box{
            width:420px;
            background:#fff;
            padding:35px;
            border-radius:8px;
            border:1px solid #d7dde5;
            box-shadow:0 4px 10px rgba(0,0,0,.08);
        }

        .login-box h1{
            text-align:center;
            color:#1e4f7a;
            font-size:28px;
            margin-bottom:8px;
        }

        .subtitle{
            text-align:center;
            color:#666;
            margin-bottom:30px;
            font-size:15px;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            color:#333;
            font-weight:bold;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:1px solid #c7ced6;
            border-radius:5px;
            font-size:15px;
            outline:none;
        }

        .input-group input:focus{
            border-color:#1830b9;
        }

        .login-options{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:25px;
        }

        .remember{
            display:flex;
            align-items:center;
            gap:6px;
            font-size:14px;
            color:#555;
        }

        .login-options a{
            text-decoration:none;
            color:#1e88e5;
            font-size:14px;
        }

        .login-options a:hover{
            text-decoration:underline;
        }

        .login-btn{
            width:100%;
            padding:12px;
            background:#1830b9;
            color:#fff;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        .login-btn:hover{
            background:#10258c;
        }

        .signup-link{
            text-align:center;
            margin-top:25px;
            font-size:14px;
            color:#555;
        }

        .signup-link a{
            text-decoration:none;
            color:#1e88e5;
            font-weight:bold;
        }

        .signup-link a:hover{
            text-decoration:underline;
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <nav>

        <a href="home.html">Home</a>
        <a href="search.html">Explore</a>
        <a href="login.html">Login</a>
        <a href="contact.html">Contact Us</a>

    </nav>

    <!-- Login -->
    <div class="login-container">

        <div class="login-box">

            <h1>For better Access</h1>

            <p class="subtitle">
                Please login to continue
            </p>

            <form id="loginForm" autocomplete="off">

                <div class="input-group">
                    <label for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        placeholder="Enter your username"
                        required>
                </div>

                <div class="input-group">
                    <label for="password" >Password</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="Enter your password"
                        required>
                </div>

                <div class="login-options">

                    <label class="remember">
                        <input type="checkbox">
                        Remember Me
                    </label>

                    <a href="#">Forgot Password?</a>

                </div>

                <button type="submit" class="login-btn">
                    Login
                </button>

            </form>

            <div class="signup-link">
                Don't have an account?
                <a href="signup.html">Sign Up</a>
            </div>

        </div>

    </div>

    <script src="login.js"></script>

</body>

</html>
